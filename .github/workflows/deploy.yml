name: Deploy para MonsterASP.NET

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependencias
        run: dotnet restore ControleProcessos/ControleProcessos.csproj

      - name: Publicar e fazer deploy
        shell: pwsh
        run: |
          dotnet publish ControleProcessos/ControleProcessos.csproj `
            -c Release `
            --self-contained false `
            -p:WebPublishMethod=MSDeploy `
            -p:MSDeployServiceURL=site70520.siteasp.net `
            -p:DeployIisAppPath=site70520 `
            -p:MSDeployPublishMethod=WMSVC `
            -p:UserName=site70520 `
            "-p:Password=hQ#5H9x?3-Te" `
            -p:AllowUntrustedCertificate=True `
            -p:SkipExtraFilesOnServer=True