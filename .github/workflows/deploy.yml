name: Deploy para MonsterASP.NET

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore ControleProcessos/ControleProcessos.csproj

      - name: Publicar aplicação
        run: |
          dotnet publish ControleProcessos/ControleProcessos.csproj `
            -c Release `
            -o published `
            --self-contained false

      - name: Deploy via Web Deploy (MSDeploy)
        shell: pwsh
        run: |
          $publishUrl = "${{site70520.siteasp.net}}"
          $username   = "${{site70520}}"
          $password   = "${{hQ#5H9x?3-Te}}"
          $siteName   = "${{site70520-WebDeploy}}"

          Compress-Archive -Path published\* -DestinationPath published.zip -Force

          & "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe" `
            -verb:sync `
            -source:package="published.zip" `
            -dest:auto,ComputerName="$publishUrl",UserName="$username",Password="$password",AuthType="Basic",IncludeAcls="False" `
            -setParam:name="IIS Web Application Name",value="$siteName" `
            -allowUntrusted
