<!DOCTYPE html>
<html>
<head>
    <title>Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .card {
            background-color: #161616;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            width: 100%;
            max-width: 400px;
        }

        .form-control {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            color: #fff;
        }

            .form-control:focus {
                background-color: #121212;
                color: #fff;
                border-color: #0d6efd;
                box-shadow: none;
            }
    </style>
</head>

<body>

    <div class="card">
        <h4 class="mb-3 text-center">Criar Conta</h4>

        <input id="nome" class="form-control mb-2" placeholder="Nome">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

        <button onclick="cadastrar()" class="btn btn-primary w-100">Cadastrar</button>

        <p class="mt-3 text-center">
            <a href="login.html">Voltar ao login</a>
        </p>
    </div>

    <script>
async function cadastrar() {
    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (!nome || !email || !senha) {
        alert("Preencha todos os campos");
        return;
    }

    const res = await fetch("https://localhost:7284/api/Usuario/cadastrar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, email, senha })
    });

    if (!res.ok) {
        alert("Erro ao cadastrar");
        return;
    }

    alert("Conta criada com sucesso!");
    window.location.href = "login.html";
}
    </script>

</body>
</html>
