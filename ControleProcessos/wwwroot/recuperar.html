<!DOCTYPE html>
<html>
<head>
    <title>Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .card {
            background-color: #161616;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            width: 100%;
            max-width: 400px;
        }
                
        h4 {
            color: #ffffff;
            font-weight: 600;
        }
        
        .form-control {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            color: #ffffff;
        }
            
            .form-control:focus {
                background-color: #121212;
                color: #ffffff;
                border-color: #0d6efd;
                box-shadow: none;
            }
            
            .form-control::placeholder {
                color: #cccccc;
                opacity: 1;
            }
    </style>
</head>

<body>

    <div class="card">
        <h4 class="mb-3 text-center">Redefinir Senha</h4>

        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="novaSenha" type="password" class="form-control mb-3" placeholder="Nova senha">

        <button onclick="redefinir()" class="btn btn-primary w-100">Atualizar Senha</button>

        <p class="mt-3 text-center">
            <a href="login.html">Voltar</a>
        </p>
    </div>

    <script>
        async function redefinir() {

                const email = document.getElementById("email").value;
                const novaSenha = document.getElementById("novaSenha").value;

        if (!email || !novaSenha) {
            alert("Preencha os campos");
            return;
        }

                const res = await fetch("https://localhost:7284/api/Usuario/redefinir-senha", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, novaSenha })
    });

        if (!res.ok) {
        alert("Erro ao atualizar senha");
        return;
        }

        alert("Senha atualizada com sucesso!");
        window.location.href = "login.html";
}
    </script>

</body>
</html>
