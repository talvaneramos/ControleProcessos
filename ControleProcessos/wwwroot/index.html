<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Controle de Processos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <style>
        body {
            background-color: #0f0f0f;
            color: #eaeaea;
        }

        .card-custom {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
        }

        .form-control {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            color: #fff;
        }

            .form-control::placeholder {
                color: #888;
            }

            .form-control:focus {
                background-color: #121212;
                color: #fff;
                border-color: #0d6efd;
                box-shadow: none;
            }

        .btn {
            border-radius: 8px;
        }

        .table {
            background-color: transparent !important;
            color: #eaeaea !important;
            width: 100%;
        }

            .table thead {
                background-color: #1a1a1a !important;
            }

                .table thead th {
                    background-color: #1a1a1a !important;
                    color: #aaa !important;
                    font-weight: 600;
                    padding: 14px 10px;
                }

            .table tbody {
                background-color: #121212 !important;
            }

                .table tbody tr {
                    background-color: #121212 !important;
                    border-bottom: 1px solid #2a2a2a;
                }

            .table td {
                background-color: #121212 !important;
                color: #eaeaea !important;
                padding: 14px 10px;
                word-wrap: break-word;
                overflow-wrap: break-word;
            }

            .table tbody tr:hover td {
                background-color: #1c1c1c !important;
            }

            .table td,
            .table th {
                border: none !important;
                vertical-align: top;
            }

                .table th:nth-child(1),
                .table td:nth-child(1) {
                    width: 60px;
                }

                .table th:nth-child(2),
                .table td:nth-child(2) {
                    width: 140px;
                }

                .table th:nth-child(3),
                .table td:nth-child(3) {
                    width: 270px;
                }

                .table th:nth-child(4),
                .table td:nth-child(4) {
                    width: 270px;
                }

                .table th:nth-child(5),
                .table td:nth-child(5) {
                    width: 90px;
                    text-align: center;
                }

                .table th:nth-child(6),
                .table td:nth-child(6) {
                    width: 180px;
                }

                .table th:nth-child(7),
                .table td:nth-child(7) {
                    width: 180px;
                }

                .table th:nth-child(8),
                .table td:nth-child(8) {
                    width: 70px;
                    text-align: center;
                }

                .table th:nth-child(9),
                .table td:nth-child(9) {
                    width: 1%;
                    white-space: nowrap;
                    padding-right: 10px;
                }

        .acoes {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

            .acoes button {
                width: 95px;
                white-space: nowrap;
                margin-left: auto;
                padding: 4px 8px;
            }
    </style>
</head>

<body class="container mt-4">
        
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">📂 Controle de Processos</h4>

        <div>
            <span id="usuarioNome" class="me-3 text-info"></span>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Sair</button>
        </div>
    </div>
        
    <div class="card-custom mb-4">
        <h5 class="mb-3">Cadastro de Processo</h5>

        <input id="numero" class="form-control mb-2" placeholder="Número do Processo">
        <input id="descricao" class="form-control mb-2" placeholder="Descrição do Objeto">
        <input id="especificacao" class="form-control mb-2" placeholder="Especificação">
        <input id="qtd" type="number" class="form-control mb-2" placeholder="Quantos Volumes?">

        <select id="local" class="form-control mb-2">
            <option value="">Selecione o Local</option>
            <option value="DCC">DCC - Departamento de Compras e Contratos</option>
            <option value="SECOG">SECOG - Controladoria</option>
            <option value="PROGE">PROGE - Procuradoria</option>
            <option value="DECOP">DECOP - Departamento de Pesquisa de Preços</option>
            <option value="COMLI">COMLI - Comissão de Licitação</option>
            <option value="FUMSA">FUMSA - Fundo Municipal de Saúde</option>
            <option value="FasePreparatoria">Fase Preparatória</option>
            <option value="CoordenadoraDeContratos">Coordenadora de Contratos</option>
            <option value="DECAU">DECAU - Departamento de Controle e Auditoria</option>
            <option value="ITBI">ITBI - Imposto sobre Transmissão de Bens Imóveis</option>
            <option value="SEFAZ">SEFAZ - Secretaria da Fazenda</option>
            <option value="GABINSEC">GABINSEC - Gabinete do Secretário da Pasta</option>
            <option value="DENUT">DENUT - Departamento de Nutrição</option>
            <option value="CAPS">CAPS - Centro de Atenção Psicossocial</option>
            <option value="VIG">VIG - Vigilância Ambiental</option>
            <option value="SEOUR">SEOUR - Secretaria de Obras e Urbanismo</option>
        </select>
        
        <input type="hidden" id="processoId">

        <button onclick="cadastrar()" class="btn btn-primary w-100 mt-2">
            Salvar Processo
        </button>
        <button onclick="limparCampos()" class="btn btn-outline-light w-100 mt-2">
            Limpar Campos
        </button>
    </div>
    
    <div class="card-custom mb-4">
        <h5 class="mb-3">Buscar Processo</h5>

        <input id="buscarNumero" class="form-control mb-2" placeholder="Digite o número...">

        <div class="d-flex gap-2">
            <button onclick="buscarProcesso()" class="btn btn-secondary w-50">Buscar</button>
            <button onclick="limparFiltro()" class="btn btn-outline-light w-50">Limpar</button>
        </div>
    </div>
    
    <div class="card-custom mb-4">
        <h5 class="mb-3">Importar Planilha</h5>    

        <input type="file" id="arquivoImportacao" class="form-control mb-2" accept=".xlsx,.xls">

    <button onclick="importar()" class="btn btn-success w-100">
        Importar Planilha
    </button>
    </div>
    
    <div class="card-custom">
        <h5 class="mb-3">Lista de Processos</h5>

        <table class="table table-borderless">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Número</th>
                    <th>Descrição do Objeto</th>
                    <th>Especificação</th>
                    <th>Volume</th>
                    <th>Local</th>
                    <th>Responsável</th>
                    <th>Dias</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

    <script>

        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.location.href = "login.html";
        };

        document.addEventListener("DOMContentLoaded", function () {

            const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

            if (!usuario || usuario.role !== "Admin") {
                const btn = document.getElementById("btnImportar");
                if (btn) btn.style.display = "none";
            }

            const nome = usuario.nome || usuario.Nome;

            if (!nome) {
                localStorage.removeItem("usuarioLogado");
                window.location.href = "login.html";
                return;
            }

            document.getElementById("usuarioNome").innerText = `Olá, ${nome}`;
        });

        const api = "https://localhost:7284/api/Processo";

        async function carregar() {
            
             const res = await fetch(api);            

            if (res.status === 204) {
                document.getElementById("tabela").innerHTML = "";
                return;
            }

            const data = await res.json();

            let html = "";

            data.forEach(p => {
                html += `
                                    <tr>
                                        <td>${p.id}</td>
                                        <td>${p.numeroProcesso}</td>
                                        <td>${p.descricaoObjeto}</td>
                                        <td>${p.especificacao}</td>
                                        <td>${p.qtdVolume ?? 0}</td>
                                        <td>${p.localAtual ?? ""}</td>
                                        <td>${p.responsavelAtual ?? ""}</td>
                                        <td>${p.tempoDias}</td>
                                        
                                        <td>

                                    <div class="acoes">
                                    <button class="btn btn-warning btn-sm" onclick="editar(${p.id})">
                                            Editar
                                    </button>

                                    <button class="btn btn-info btn-sm" onclick="moverProcesso(${p.id})">
                                            Mover
                                    </button>

                                    <button class="btn btn-secondary btn-sm" onclick="verHistorico(${p.id})">
                                            Histórico
                                    </button>

                                    <button class="btn btn-danger btn-sm" onclick="remover(${p.id})">
                                            Excluir
                                    </button>
                                    </div>
                                    
                                    </td>
                                    </tr>
                                `;
            });

            document.getElementById("tabela").innerHTML = html;
        }

        async function cadastrar() {
            const id = document.getElementById("processoId").value;

            const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

            const body = {
                numeroProcesso: document.getElementById("numero").value,
                descricaoObjeto: document.getElementById("descricao").value,
                especificacao: document.getElementById("especificacao").value,
                qtdVolume: parseInt(document.getElementById("qtd").value),
                localEntrada: document.getElementById("local").value,
                responsavelAtual: usuario.nome || usuario.Nome
            };

            if (id) {
                body.id = parseInt(id);

                await fetch(`${api}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                alert("Atualizado com sucesso!");
            } else {
                await fetch(api, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                alert("Processo cadastrado com sucesso!");
            }

            document.getElementById("processoId").value = "";
            document.getElementById("numero").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("especificacao").value = "";
            document.getElementById("qtd").value = "";
            document.getElementById("local").value = "";

            document.querySelector("button.btn-primary").innerText = "Cadastrar";

            carregar();
        }

        async function buscarProcesso() {
            let numero = document.getElementById("buscarNumero").value;

            numero = numero.replace(/\./g, "").trim();

            if (!numero) {
                carregar();
                return;
            }

            const res = await fetch(`${api}/buscar?numero=${encodeURIComponent(numero)}`);

            if (res.status === 404) {
                alert("Processo não encontrado");
                return;
            }

            const p = await res.json();

            document.getElementById("tabela").innerHTML = `
                                <tr>
                                    <td>${p.id}</td>
                                    <td>${p.numeroProcesso}</td>
                                    <td>${p.descricaoObjeto}</td>
                                    <td>${p.especificacao}</td>
                                    <td>${p.qtdVolume ?? 0}</td>                                    
                                    <td>${p.localEntrada}</td>
                                    <td>${p.responsavelAtual ?? ""}</td>
                                    <td>${p.tempoDias}</td>
                                    
                                    <td>
                                    
                                    <div class="acoes">
                                        <button class="btn btn-warning btn-sm" onclick="editar(${p.id})">
                                                Editar
                                        </button>

                                        <button class="btn btn-info btn-sm" onclick="moverProcesso(${p.id})">
                                                Mover
                                        </button>

                                        <button class="btn btn-secondary btn-sm" onclick="verHistorico(${p.id})">
                                                Histórico
                                        </button>

                                        <button class="btn btn-danger btn-sm" onclick="remover(${p.id})">
                                                Excluir
                                        </button>
                                        </div>
                                </td>
                                </tr>
                            `;
        }

        async function editar(id) {
            const res = await fetch(`${api}/${id}`);
            const processo = await res.json();

            if (!processo) {
                alert("Processo não encontrado");
                return;
            }

            document.getElementById("processoId").value = processo.id;
            document.getElementById("numero").value = processo.numeroProcesso;
            document.getElementById("descricao").value = processo.descricaoObjeto;
            document.getElementById("especificacao").value = processo.especificacao;
            document.getElementById("qtd").value = processo.qtdVolume;
            document.getElementById("local").value = processo.localAtual;

            document.querySelector("button.btn-primary").innerText = "Atualizar";

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        }

        async function remover(id) {
            if (!confirm("Deseja realmente excluir este registro?")) return;

            await fetch(`${api}/${id}`, { method: "DELETE" });

            alert("Registro removido com sucesso!");
            carregar();
        }

        async function moverProcesso(id) {
            const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
            const responsavel = usuario.nome || usuario.Nome;

            const overlay = document.createElement("div");
            overlay.style.position = "fixed";
            overlay.style.top = 0;
            overlay.style.left = 0;
            overlay.style.width = "100%";
            overlay.style.height = "100%";
            overlay.style.backgroundColor = "rgba(0,0,0,0.6)";
            overlay.style.display = "flex";
            overlay.style.justifyContent = "center";
            overlay.style.alignItems = "center";
            overlay.style.zIndex = 9999;

            overlay.innerHTML = `
                    <div style="
                        background:#1e1e1e;
                        padding:20px;
                        border-radius:10px;
                        width:300px;
                        color:white;
                        text-align:center;
                    ">
                        <h5>Selecionar o Destino</h5>

                        <select id="novoLocal" style="
                            width:100%;
                            margin-top:10px;
                            padding:8px;
                            background:#121212;
                            color:white;
                            border:1px solid #333;
                            border-radius:5px;
                        ">
                            <option value="">Selecione</option>
                            <option value="DCC">DCC - Departamento de Compras e Contratos</option>
                            <option value="SECOG">SECOG - Controladoria</option>
                            <option value="PROGE">PROGE - Procuradoria</option>
                            <option value="DECOP">DECOP - Departamento de Pesquisa de Preços</option>
                            <option value="COMLI">COMLI - Comissão de Licitação</option>
                            <option value="FUMSA">FUMSA - Fundo Municipal de Saúde</option>
                            <option value="FasePreparatoria">Fase Preparatória</option>
                            <option value="CoordenadoraDeContratos">Coordenadora de Contratos</option>
                            <option value="DECAU">DECAU - Departamento de Controle e Auditoria</option>
                            <option value="ITBI">ITBI - Imposto sobre Transmissão de Bens Imóveis</option>
                            <option value="SEFAZ">SEFAZ - Secretaria da Fazenda</option>
                            <option value="GABINSEC">GABINSEC - Gabinete do Secretário da Pasta</option>
                        </select>

                        <textarea id="justificativa"
                                        placeholder="Informe a justificativa da movimentação"
                                        style="
                                        width:100%;
                                        margin-top:10px;
                                        padding:10px;
                                        background:#121212;
                                        color:white;
                                        border:1px solid #333;
                                        border-radius:5px;
                                        min-height:90px;
                                        resize:none;
                        "></textarea>

                        <div style="margin-top:15px;">
                            <button id="btnConfirmar" class="btn btn-primary btn-sm">OK</button>
                            <button id="btnCancelar" class="btn btn-secondary btn-sm">Cancelar</button>
                        </div>
                    </div>
                `;

            document.body.appendChild(overlay);

            document.getElementById("btnCancelar").onclick = () => {
                overlay.remove();
            };

            document.getElementById("btnConfirmar").onclick = async () => {
                const novoLocal = document.getElementById("novoLocal").value;

                if (!novoLocal) {
                    alert("Selecione um local");
                    return;
                }
                const justificativa = document.getElementById("justificativa").value.trim();

                if (!justificativa) {
                    alert("Informe a justificativa");
                    return;
                }

                await fetch("https://localhost:7284/api/Movimentacao", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        processoId: id,
                        novoLocal: novoLocal,
                        responsavel: responsavel,
                        justificativa: justificativa
                    })
                });

                alert("Movimentado com sucesso!");
                overlay.remove();
                carregar();
            };
        }


        async function verHistorico(id) {
            try {
                const res = await fetch(`https://localhost:7284/api/Movimentacao/processo/${id}`);

                if (!res.ok) {
                    alert("Processo recém cadastrado. Não possui histórico.");
                    return;
                }

                const data = await res.json();

                if (!data || data.length === 0) {
                    alert("Este processo ainda não possui histórico.");
                    return;
                }

                let html = `
                            <div style="
                                        background:#1e1e1e;
                                        padding:20px;
                                        border-radius:10px;
                                        color:white;
                                        max-height:400px;
                                        overflow:auto;
                                        ">

                <h5>Histórico do Processo</h5>
        `;

                data.forEach(m => {
                    html += `
                            <div style="margin-bottom:10px;">
                                        <strong>Data:</strong> ${new Date(m.dataMovimentacao).toLocaleString()}<br>
                                        <strong>Origem:</strong> ${m.localOrigem}<br>
                                        <strong>Destino:</strong> ${m.localDestino}<br>
                                        <strong>Justificativa:</strong> ${m.justificativa ?? "Não informado"}<br>
                                        <strong>Responsável:</strong> ${m.responsavel}
                                        </div>
                                        
                                        <hr style="border-color:#333;">
            `;
                });

                html += `
                            <div style="text-align:center;margin-top:15px;">
                                        <button id="btnExcel" class="btn btn-success btn-sm">Excel</button>
                                        <button id="btnPdf" class="btn btn-danger btn-sm">PDF</button>
                                        <button id="btnFechar" class="btn btn-secondary btn-sm">Fechar</button>
                            </div>
            </div>
        `;

                const overlay = document.createElement("div");
                overlay.style.position = "fixed";
                overlay.style.top = 0;
                overlay.style.left = 0;
                overlay.style.width = "100%";
                overlay.style.height = "100%";
                overlay.style.background = "rgba(0,0,0,0.7)";
                overlay.style.display = "flex";
                overlay.style.justifyContent = "center";
                overlay.style.alignItems = "center";
                overlay.style.zIndex = 9999;

                overlay.innerHTML = html;
                document.body.appendChild(overlay);

                document.getElementById("btnFechar").onclick = () => overlay.remove();

                document.getElementById("btnExcel").onclick = () => exportarExcel(id);
                document.getElementById("btnPdf").onclick = () => exportarPDF(id);

            } catch (error) {
                console.error(error);
                alert("Erro inesperado ao carregar histórico.");
            }
        }

        function limparFiltro() {
            document.getElementById("buscarNumero").value = "";
            carregar();
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        carregar();

        async function exportarExcel(id) {
            const response = await fetch(`https://localhost:7284/api/Movimentacao/exportar/excel/${id}`);

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "historico.xlsx";
            a.click();

            window.URL.revokeObjectURL(url);
        }

        async function exportarPDF(id) {
            const response = await fetch(`https://localhost:7284/api/Movimentacao/exportar/pdf/${id}`);

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "historico.pdf";
            a.click();

            window.URL.revokeObjectURL(url);
        }

        function limparCampos() {
            document.getElementById("processoId").value = "";
            document.getElementById("numero").value = "";
            document.getElementById("descricao").value = "";
            document.getElementById("especificacao").value = "";
            document.getElementById("qtd").value = "";
            document.getElementById("local").value = "";            
            document.querySelector("button.btn-primary").innerText = "Cadastrar";
        }


        async function importar() {
            const input = document.getElementById("arquivoImportacao");

            if (!input.files.length) {
                alert("Selecione um arquivo");
                return;
            }

            const formData = new FormData();
            formData.append("arquivo", input.files[0]);

            try {
                const res = await fetch("https://localhost:7284/api/Processo/importar", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (!res.ok) {
                    alert("Erros encontrados:\n\n" + data.erros.join("\n"));
                    return;
                }

                alert("Importado com sucesso!");
                carregar();

            } catch (e) {
                alert("Erro inesperado");
                console.error(e);
            }
        }
    </script>

</body>
</html>
