<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f0f0f;
            color: #eaeaea;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }

        .form-control {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            color: #fff;
        }

            .form-control::placeholder {
                color: #888;
            }

            .form-control:focus {
                background-color: #121212;
                color: #fff;
                border-color: #0d6efd;
                box-shadow: none;
            }

        .btn {
            border-radius: 8px;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        a {
            color: #0d6efd;
            font-size: 14px;
        }

            a:hover {
                text-decoration: underline;
            }
    </style>
</head>

<body>

    <div class="login-card">

        <h3 class="title">🔐 Acesso ao Sistema</h3>
        <div class="subtitle">Controle de Processos</div>

        <input id="email" class="form-control mb-3" placeholder="Email">

        <div class="position-relative mb-3">

            <input id="senha"
                   type="password"
                   class="form-control pe-5"
                   placeholder="Senha">

            <span onclick="toggleSenha()"
                  style="
                        position:absolute;
                        right:15px;
                        top:50%;
                        transform:translateY(-50%);
                        cursor:pointer;
                        color:#aaa;
                        user-select:none;
                        font-size:18px;
          ">
                👁
            </span>

        </div>

        <button onclick="login()" class="btn btn-primary w-100">
            Entrar
        </button>

        <p class="mt-2 text-center">
            <a href="recuperar.html">Esqueci minha senha</a>
        </p>

        <p class="mt-3 text-center">
            <a href="cadastro.html">Criar conta</a>
        </p>
    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            if (!email || !senha) {
                alert("Preencha email e senha");
                return;
            }

            const res = await fetch("https://localhost:7284/api/Usuario/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, senha })
            });

            if (!res.ok) {
                alert("Usuário ou senha inválidos");
                return;
            }

            const data = await res.json();           

            if (!data || !data.usuario) {
                alert("Erro ao obter usuário");
                return;
            }
            
            localStorage.setItem("token", data.token);            
            localStorage.setItem("usuarioLogado", JSON.stringify(data.usuario));

            window.location.href = "index.html";
        }

        function toggleSenha() {

            const input = document.getElementById("senha");

            if (!input)
                return;

            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
</body>
</html>
